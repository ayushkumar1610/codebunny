services:
  agent:
    build: .
    image: code-bunny:latest
    container_name: code-bunny-agent
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./repos:/app/repos
      - ./logs:/app/logs
    restart: unless-stopped
  postgres:
    image: postgres:15-alpine
    container_name: code-bunny-db
    environment:
      POSTGRES_USER: bunny
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codebunny_stats
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
